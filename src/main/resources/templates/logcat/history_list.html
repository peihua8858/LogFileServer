<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="icon" th:href="@{/static/common/images/favicon.ico}" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--    jQuery相关-->
<!--    <script th:src="@{/static/js/jquery/jquery.js}" type="text/javascript"></script>-->
    <script th:src="@{/static/common/js/jquery/jquery.min.js}" type="text/javascript"></script>

    <!--    dataTable 相关-->
    <link rel="stylesheet" th:href="@{/static/common/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/static/common/css/dataTables.bootstrap4.min.css}"/>

    <script th:src="@{/static/common/js/dataTable/jquery.dataTables.min.js}" type="text/javascript"></script>
    <script th:src="@{/static/common/js/dataTable/dataTables.bootstrap4.min.js}" type="text/javascript"></script>
    <!--自定义js-->
    <script type="text/javascript" charset="utf8" th:src="@{/static/common/js/dateFormat.js}"></script>
    <script th:src="@{/static/logcat/history.js}" type="text/javascript"></script>
    <title>移动组的日志系统</title>
    <style>
    </style>
</head>
<body>
<div style="margin: 20px">
    <label style="width: 100%; text-align: center;color: red">注意：历史日志仅保存最近15日内记录，超过15日系统将自动删除，如需保留的日志超过15日，请将日志锁定。</label>
    <div class="input-group mb-3" style="width:95%;margin-bottom: 15px;margin-left: 30px;margin-right:50px;">
        <div class="col-auto my-1" hidden role="group" aria-label="First group" style=" float: right">
            <button  onclick="clearLog()" class="btn btn-outline-secondary mr-sm-2" type="button">清除历史日志</button>
        </div>
        <div class="col-auto my-1">
            <select class="custom-select mr-sm-2 divMarginTop" id="platform" name="platform">
                <option value="">All</option>
            </select>
        </div>
    </div>
    <table id="table_list" class="table table-striped table-bordered" style="width:100%">
        <thead class="thead-light">
        <tr>
            <th scope="col">#</th>
            <th scope="col">Url</th>
            <th scope="col">FeeTime(ms/N)</th>
            <th scope="col">UpdateTime</th>
            <th scope="col">Option</th>
        </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>
</body>
</html>
