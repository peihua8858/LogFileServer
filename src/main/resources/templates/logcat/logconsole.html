<!DOCTYPE html>
<html lang="en" class="no-js" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" th:href="@{/static/common/images/favicon.ico}" type="image/x-icon">
    <title>移动组日志系统</title>

    <link rel="stylesheet" type="text/css" th:href="@{/static/menu/css/normalize.css}"/>
    <link rel="stylesheet" type="text/css" th:href="@{/static/menu/css/icons.css}"/>
    <link rel="stylesheet" type="text/css" th:href="@{/static/menu/css/component.css}"/>
    <link rel="stylesheet" th:href="@{/static/common/css/font-awesome.min.css}"/>
    <link rel="stylesheet" th:href="@{/static/common/css/bootstrap.min.css}"/>
<!--    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>-->
    <script th:src="@{/static/common/js/axios.min.js}" type="text/javascript"></script>
    <script th:src="@{/static/menu/js/modernizr.custom.js}" type="text/javascript"></script>
    <!--    jQuery相关-->
<!--    <script th:src="@{/static/js/jquery/jquery.js}" type="text/javascript"></script>-->
    <script th:src="@{/static/common/js/jquery/jquery.min.js}" type="text/javascript"></script>
    <script th:src="@{/static/common/js/jquery/jquery.mousewheel.js}" type="text/javascript"></script>
    <script th:src="@{/static/common/js/jquery/jquery.mousewheel.min.js}" type="text/javascript"></script>
    <style>
        html, body {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .parent {
            position: relative;
            height: 100%;
            width: 100%;
        }

        .nav {
            height: auto;
            max-height: 120px;
            width: 100%; /*必须沾满宽度防止浮动*/
            float: left; /*必须*/
            margin-left: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .logContent {
            flex: 1;
            /*position: relative;*/
            /*height: 93%; !*必须*!*/
            overflow-x: hidden;
            overflow-y: scroll;
            z-index: auto;
            background: #333;
            color: #aaa;
            padding: 12px;
            word-wrap: break-word;
        }

        .logCat {
            width: auto;
        }

        ul > a {
            text-decoration: none;
        }
    </style>
</head>
<body>
<div id="st-container" class="st-container">
    <!--
        example menus
        these menus will be on top of the push wrapper
    -->
    <nav class="st-menu st-effect-1" id="menu-1">
        <div id="st-trigger-effects1" class="mr-2 mt-2" style="text-align: right">
            <img data-effect="st-effect-1" src="../../../static/common/images/ic_close.png" th:src="@{/static/common/images/ic_close.png}"/>
        </div>
        <ul class="mt-3">
            <li><a class="icon" style="text-decoration: none;" id="interfaceSimulation" href="/api" target="_blank">
                <img border="0" class="mr-2" style="width:35px;height: 35px;" src="../../../static/common/images/ic_api_model.png"
                     th:src="@{/static/common/images/ic_api_model.png}"/>接口模拟</a></li>
            <li><a class="icon" style="text-decoration: none;" id="historyLog" href="/log" target="_blank">
                <img border="0" class="mr-2" style="width:35px;height: 35px;" src="../../../static/common/images/ic_history.png"
                     th:src="@{/static/common/images/ic_history.png}"/>历史日志</a></li>
            <li><a class="icon" style="text-decoration: none;" id="analysisLog" href="/analysis" target="_blank">
                <img border="0" class="mr-2" style="width:35px;height: 35px;" src="../../../static/common/images/ic_analysis.png"
                     th:src="@{/static/common/images/ic_analysis.png}"/>统计代码日志</a></li>
            <li><a class="icon" style="text-decoration: none;" id="reset_doc" href="/docs/api.html" target="_blank">
                <img border="0" class="mr-2" style="width:35px;height: 35px;" src="../../../static/common/images/ic_reset_api.png"
                     th:src="@{/static/common/images/ic_reset_api.png}"/>系统接入文档</a>
            </li>
            <li><a class="icon" style="text-decoration: none;" id="app_version" href="/appVersion" target="_blank">
                <img border="0" class="mr-2" style="width:35px;height: 35px;" src="../../../static/common/images/ic_version.png"
                     th:src="@{/static/common/images/ic_version.png}"/>App 版本信息</a></li>
            <li><a class="icon" style="text-decoration: none;" id="app_languages" href="/strings" target="_blank">
                <img border="0" class="mr-2" style="width:35px;height: 35px;" src="../../../static/common/images/ic_language.png"
                     th:src="@{/static/common/images/ic_language.png}"/>App多语言</a></li>
            <li><a class="icon" style="text-decoration: none;" id="deeplinkTest" href="/link/zaful" target="_blank">
                <img border="0" class="mr-2" style="width:35px;height: 35px;" src="../../../static/common/images/link.png"
                     th:src="@{/static/common/images/link.png}"/>Deeplink测试</a></li>
            <li><a class="icon" style="text-decoration: none;" id="showImages" href="/showImages" target="_blank">
                <img border="0" class="mr-2" style="width:35px;height: 35px;" src="../../../static/common/images/ic_images.png"
                     th:src="@{/static/common/images/ic_images.png}"/>图片</a></li>
            <li><a class="icon" style="text-decoration: none;" id="uploadApp" href="/upload/index" target="_blank">
                <img border="0" class="mr-2" style="width:35px;height: 35px;" src="../../../static/common/images/ic_upload.png"
                     th:src="@{/static/common/images/ic_upload.png}"/>上传App文件</a></li>

        </ul>
    </nav>
    <!-- content push wrapper -->
    <div class="st-pusher">
        <!--
            example menus
            these menus will be under the push wrapper
        -->
        <div class="st-content"><!-- this is the wrapper for the content -->
            <div class="st-content-inner"><!-- extra div for emulating position:fixed of the menu -->
                <!--						<div class="main">-->
                <div class="parent" style="display: flex;flex-direction: column">
                    <div class="nav form-row align-items-center">
                        <div class="btn-toolbar" role="toolbar" aria-label="Toolbar with button groups">
                            <div class="btn-group mr-2  mt-2" role="group" aria-label="First group">
                                <button data-effect="st-effect-1" id="st-trigger-effects"
                                        class="fa fa-bars btn btn-outline-secondary"></button>
                                <button id="openLog" type="button" class="btn btn-outline-secondary">打开日志</button>
                                <button id="closeLog" type="button" class="btn btn-outline-secondary">关闭日志</button>
                                <button id="clearLog" type="button" class="btn btn-outline-secondary">清空日志</button>
                            </div>
                            <div class="btn-group mr-2  mt-2" role="group" aria-label="Second group">
                                <a id="appDownload" class="btn btn-outline-success" href="/app" target="_blank">
                                    APP下载管理
                                </a>
                                <a id="tools" class="btn btn-outline-info btn-outline-success" href="/tools" target="_blank">
                                    工具箱
                                </a>
                                <a id="link" class="btn btn-outline-info btn-outline-success" href="/link/list" target="_blank">
                                    Deeplink文档
                                </a>
                            </div>
                        </div>
                        <div class="col-auto my-1">
                            <select class="custom-select mr-sm-2  mt-2" id="cur_system">
                                <option value="0">系统...</option>
                                <option value="1">Android</option>
                                <option value="2">iOS</option>
                            </select>
                        </div>
                        <div class="col-auto my-1">
                            <select class="custom-select mr-sm-2  mt-2" id="cur_project">
                                <option value="">项目过滤...</option>
                            </select>
                        </div>
                        <input type="hidden" id="platform_name" placeholder="平台过滤"/>
                        <div class="col-auto my-1">
                            <select class="custom-select mr-sm-2  mt-2" id="platform" name="platform">
                                <option value="">平台过滤...</option>
                            </select>
                        </div>
                        <div class="col-auto my-1">
                            <div class="col-sm-10 col-xs-3  mt-2">
                                <input type="text" class="form-control" id="keywordFilter" placeholder="关键字过滤"
                                       name="keywordFilter"/>
                            </div>
                        </div>
                    </div>
                    <div id="log_console"  class="logContent"></div>
                </div>

                <!--						</div>&lt;!&ndash; /main &ndash;&gt;-->
            </div><!-- /st-content-inner -->
        </div><!-- /st-content -->
    </div><!-- /st-pusher -->
</div><!-- /st-container -->
<script th:src="@{/static/menu/js/classie.js}" type="text/javascript" th:inline="javascript"></script>
<script th:src="@{/static/menu/js/sidebarEffects.js}" type="text/javascript" th:inline="javascript"></script>
<script th:src="@{/static/logcat/log_console.js}" type="text/javascript" th:inline="javascript"></script>
</body>
</html>
