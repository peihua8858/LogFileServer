<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/static/common/images/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/common/css/font-awesome.min.css"/>
    <title>文件上传</title>
    <link rel="stylesheet" th:href="@{/static/common/css/bootstrap.min.css}"/>
    <script th:src="@{/static/common/js/jquery/jquery.min.js}"></script>
    <style>

        body, html {
            margin: 0 auto;
            text-align: center;
            alignment: center;
        }

        .up-content {
            min-height: 20em;
            max-height: 40em;
            width: 65%;
            overflow-y: auto;
            border: 1px solid #CCCCCC;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #FAFAFA;
            color: #999;
            font-size: 20px;
            text-align: center;
        }

        .up-area {
            border: 2px dashed #ccc;
            margin: 10px 20px 20px 20px;
            width: 95%;
            height: 100%;
            min-height: 20em;
            background-color: #fff;
        }

        .list-group {
            margin: 0 auto;;
            width: 100%;
            height: 100%;
            padding: 10px;
        }

        span {
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            max-height: 10em;
        }

        /*ul.list-group:after {*/
        /*    clear: both;*/
        /*    display: inline-block;*/
        /*}*/

        .list-group-item {
            float: left;
            display: inline-block;
        }

        .container {
            width: 100%;
            height: 100%;
            text-align: center;
        }

        img {
            width: 35%;
            height: 35%;
            max-height: 100px;
            max-width: 150px;
        }
    </style>
</head>
<body>
<div class="container upload mt-5 ">
    <!-- 拖拽图片到这来 -->
    <div class="up-content dragFile">
        <p style="margin-top:10px;">拖拽图片到这里哟</p>
        <div class="up-area">
            <input type="file" style="display:none;" id="fileDrag" name="fileDragselect" multiple>
            <ul class="list-group list-drag">
            </ul>
        </div>
    </div>
    <div class="input-group mt-3" style="text-align: center">
        <button type="button" class="btn btn-primary">上传图片</button>
    </div>

</div>
<script type="text/javascript">
    //拖拽上传文件 在页面进行预览 上传form用到ajax
    const dragbox = document.querySelector('.dragFile');
    dragbox.addEventListener('dragover', function (e) {
        e.preventDefault(); // 必须阻止默认事件
    }, false);
    dragbox.addEventListener('drop', function (e) {
        e.preventDefault(); // 阻止默认事件
        const files = e.dataTransfer.files; //获取文件
        appendFile(files, '.list-drag')
        // code
    }, false);

    function appendFile(files, listName) {
        for (let index = 0; index3 < files.length; index3++) {
            let file = files[index3]
            let fileName = file.name
            let url = window.URL.createObjectURL(file);
            let liStr = `
            <li class="list-group-item">
               <div class="d-inline-flex"  style="text-align: center">
                <img src="${url}" alt="${fileName}" />
                <span class="file_name">${fileName}</span>
                <span class="filename__extension">pdf</span>
               </div>
            </li>
          `;
            $(listName).append(liStr);
        }
    }
</script>
</body>
</html>
