<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:svg="http://www.w3.org/2000/svg">
<head>
    <meta charset="UTF-8">
    <link rel="icon" th:href="@{/static/common/images/favicon.ico}" type="image/x-icon">
    <title>App文件上传</title>
    <link rel="stylesheet" th:href="@{/static/common/css/bootstrap.min.css}"/>
    <!-- 引用控制层插件样式 -->
    <script th:src="@{/static/common/js/jquery/jquery.min.js}"></script>

    <script th:src="@{/static/upload/js/app-info-parser.min.js}"></script>
    <!-- 引用初始化JS -->
    <script th:src="@{/static/upload/js/script.js}"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .upload-drop-zone {
            height: 200px;
            border-width: 2px;
            margin-bottom: 20px;
        }

        /* skin.css Style*/
        .upload-drop-zone {
            color: #ccc;
            border-style: dashed;
            border-color: #ccc;
            line-height: 200px;
            text-align: center
        }

        .upload-drop-zone.drop {
            color: #222;
            border-color: #222;
        }
    </style>
    <script>
        $(function () {
            'use strict';
            // UPLOAD CLASS DEFINITION
            // ======================
            const dropZone = document.getElementById('drop-zone');
            const uploadForm = document.getElementById('js-upload-form');

            const startUpload = function (files) {
                console.log(files)
            };

            uploadForm.addEventListener('submit', function (e) {
                const uploadFiles = document.getElementById('js-upload-files').files;
                e.preventDefault()

                startUpload(uploadFiles)
            })

            dropZone.ondrop = function (e) {
                e.preventDefault();
                this.className = 'upload-drop-zone';

                startUpload(e.dataTransfer.files)
            }

            dropZone.ondragover = function () {
                this.className = 'upload-drop-zone drop';
                return false;
            }

            dropZone.ondragleave = function () {
                this.className = 'upload-drop-zone';
                return false;
            }
        })
    </script>
</head>
<body>
<div class="container">
    <div class="panel panel-default">
        <div class="panel-heading"><strong>Upload Files</strong></div>
        <div class="panel-body">
            <form action="" method="post" enctype="multipart/form-data" id="js-upload-form">
                <div class="form-group">
                    <div class="upload-drop-zone" id="drop-zone">
                        Just drag and drop files here
                        <input type="file" name="files[]" id="js-upload-files">
                    </div>
                </div>
                <button type="submit" class="btn btn-sm btn-primary" id="js-upload-submit">Upload files</button>
            </form>
            <!-- Progress Bar -->
            <div class="progress">
                <div class="progress-bar" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100"
                     style="width: 60%;">
                    <span class="sr-only">60% Complete</span>
                </div>
            </div>
            <!-- Upload Finished -->
            <div class="js-upload-finished">
                <h3>Processed files</h3>
                <div class="list-group">
                    <a href="#" class="list-group-item list-group-item-success"><span
                            class="badge alert-success pull-right">Success</span>image-01.jpg</a>
                    <a href="#" class="list-group-item list-group-item-success"><span
                            class="badge alert-success pull-right">Success</span>image-02.jpg</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
